name: buf-ci

# Validates the proto source and publishes the named module to the
# Buf Schema Registry (https://buf.build/tinklecorp/tinkle-proto).
#
# The BSR serves Go and Rust SDKs to consumers directly, so no
# per-language build jobs run here. Consumers:
#   Go:   go get buf.build/gen/go/tinklecorp/tinkle-proto/{protocolbuffers,grpc}/go
#   Rust: cargo add --registry buf tinklecorp_tinkle-proto_bufbuild_community_tonic-prost
#
# Required secret: BUF_TOKEN (a BSR API token for the tinklecorp
# org). It must be set BEFORE the first merge to main, otherwise
# the initial `buf push` will fail and the BSR module will not be
# created. The action auto-creates the BSR repo on first push;
# `push_create_visibility: public` makes that explicit so the repo
# is created with the same visibility as a subsequent explicit
# `buf push` would produce.

on:
  push:
    branches: [main]
    paths:
      - 'tinkle/**'
      - 'buf.yaml'
      - 'buf.lock'
      - 'LICENSE'
      - 'README.md'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  delete:

permissions:
  contents: read
  pull-requests: write

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          push_create_visibility: public
