version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels: ["dependencies", "ci"]

  - package-ecosystem: "buf"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(buf)"
    labels: ["dependencies", "buf"]

  - package-ecosystem: "gomod"
    directory: "/go"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(go)"
    labels: ["dependencies", "go"]

  - package-ecosystem: "cargo"
    directory: "/rs"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(rs)"
    labels: ["dependencies", "rs"]

  - package-ecosystem: "mix"
    directory: "/elixir"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(elixir)"
    labels: ["dependencies", "elixir"]
