version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/tinklehq/tinkle-proto/go
plugins:
  - local: protoc-gen-go
    out: go
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  - local: protoc-gen-elixir
    out: elixir/lib
    opt:
      - module_prefix=Tinkle.V1
      - elixir_module_name_option_suffix=_pb
  - local: protoc-gen-grpc-elixir
    out: elixir/lib
    opt:
      - module_prefix=Tinkle.V1
      - elixir_module_name_suffix=_pb_service
      - grpc_service_generate_client=true
      - grpc_service_generate_server=false
