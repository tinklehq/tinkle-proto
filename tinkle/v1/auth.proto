// Auth RPC Service - Aggregator Layer.
//
// Aggregator service between rpc-gateway and core services.
// Provides authentication flows by orchestrating identity-service and user-service.
syntax = "proto3";

package tinkle.v1;

import "google/protobuf/timestamp.proto";
import "tinkle/v1/common.proto";

option go_package = "github.com/tinklehq/tinkle-proto/tinkle/v1;tinklev1";

// AuthService provides authentication operations for the gateway layer.
service AuthService {
  // SendCode initiates verification code delivery via SMS.
  // Returns the delivery method and request tracking information.
  rpc SendCode(SendCodeRequest) returns (SendCodeResponse);

  // SignIn verifies code and returns user data with a session token.
  // Creates a new user account if the phone number is not registered.
  rpc SignIn(SignInRequest) returns (SignInResponse);
}

// =============================================================================
// SendCode RPC
// =============================================================================

// SendCodeRequest contains the phone number and language for code delivery.
message SendCodeRequest {
  // Phone number in E.164 format (e.g., "+14155551234").
  string phone_number = 1;
  // ISO 639-1 language code for SMS content (e.g., "en", "zh").
  string lang_code = 2;
}

// SendCodeResponse confirms code was sent and provides tracking info.
message SendCodeResponse {
  // Delivery method used for this request.
  VerificationCodeType code_type = 1;
  // Request identifier for tracking/debugging.
  string request_id = 2;
  // Timestamp when the code expires.
  google.protobuf.Timestamp expires_at = 3;
}

// =============================================================================
// SignIn RPC
// =============================================================================

// SignInRequest contains the phone number and verification code.
message SignInRequest {
  // Phone number in E.164 format.
  string phone_number = 1;
  // Verification code received via SMS (typically 6 digits).
  string code = 2;
}

// SignInResponse contains user information and an opaque session token.
// Aggregated from identity-service (session token) and user-service (user data).
message SignInResponse {
  // User information (Empty if user is not active, UserData if active).
  User user = 1;
  // Opaque, long-lived session token. Persisted on the client device and
  // presented on every authenticated request. The server is stateless and
  // validates the token directly (no refresh, renewal, or rotation flow).
  string session_token = 2;
  // True if this sign-in created a new user account.
  bool is_new_user = 3;
}
