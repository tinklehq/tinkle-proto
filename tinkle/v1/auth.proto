// Auth RPC Service - Aggregator Layer
// Version: 2.0.0
//
// Aggregator service between rpc-gateway and core services.
// Provides authentication flows by orchestrating identity-service and user-service.

syntax = "proto3";

package tinkle.v1;

import "google/protobuf/timestamp.proto";
import "tinkle/v1/common.proto";

option go_package = "github.com/tinklehq/tinkle-server/proto/tinkle/v1;tinklev1";

// AuthService provides authentication operations for the gateway layer.
//
// Uses data-centric method naming and intuitive message naming.
service AuthService {
  // SendCode initiates verification code delivery via SMS.
  // Returns the delivery method and request tracking information.
  rpc SendCode(SendCodeInput) returns (CodeDeliveryResult);

  // SignIn verifies code and returns user data with auth tokens.
  // Creates a new user account if the phone number is not registered.
  rpc SignIn(SignInInput) returns (AuthData);

  // RenewToken refreshes tokens using a valid refresh token.
  // Returns updated user data with new tokens.
  rpc RenewToken(RenewTokenInput) returns (AuthData);
}

// SendCodeInput contains phone number and language for code delivery.
message SendCodeInput {
  // Phone number in E.164 format (e.g., "+14155551234")
  string phone_number = 1;

  // ISO 639-1 language code for SMS content (e.g., "en", "zh")
  string lang_code = 2;
}

// CodeDeliveryResult confirms code was sent and provides tracking info.
message CodeDeliveryResult {
  // Delivery method used for this request
  VerificationCodeType code_type = 1;

  // Request identifier for tracking/debugging
  string request_id = 2;

  // Timestamp when the code expires
  google.protobuf.Timestamp expires_at = 3;
}

// SignInInput contains phone number and verification code.
message SignInInput {
  // Phone number in E.164 format
  string phone_number = 1;

  // Verification code received via SMS (typically 6 digits)
  string code = 2;
}

// RenewTokenInput contains the refresh token for renewal.
message RenewTokenInput {
  // Current refresh token
  string refresh_token = 1;
}

// AuthData contains user information and auth tokens.
// Aggregated from identity-service (tokens) and user-service (user data).
message AuthData {
  // User information (Empty if user is not active, UserData if active)
  User user = 1;

  // JWT ID token containing user claims
  string id_token = 2;

  // Refresh token for obtaining new access tokens
  string refresh_token = 3;

  // Token type (always "Bearer")
  string token_type = 4;

  // True if this sign-in created a new user account
  bool is_new_user = 5;
}
