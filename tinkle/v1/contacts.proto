// Contacts RPC Service - Client-Facing Aggregator Layer.
//
// Aggregator service for contact management operations.
// Provides contact import, list management, and blocking.
syntax = "proto3";

package tinkle.v1;

import "google/protobuf/timestamp.proto";
import "tinkle/v1/common.proto";

option go_package = "github.com/tinklehq/tinkle-proto/tinkle/v1;tinklev1";

// ContactsService provides contact management operations for the gateway layer.
//
// All methods require a valid JWT token with user context.
// User ID is extracted from the token claims.
service ContactsService {
  // ImportContacts imports phone contacts from device address book.
  // Resolves phone numbers to Tinkle users and stores for future matching.
  // Maximum batch size: 500 contacts.
  rpc ImportContacts(ImportContactsRequest) returns (ImportContactsResponse);

  // GetContacts retrieves the user's contact list.
  // Supports hash-based caching for differential sync.
  rpc GetContacts(GetContactsRequest) returns (GetContactsResponse);

  // GetPresences retrieves online/offline/unknown status for all caller's contacts.
  rpc GetPresences(GetPresencesRequest) returns (GetPresencesResponse);

  // AddContact adds a known Tinkle user as a contact.
  rpc AddContact(AddContactRequest) returns (AddContactResponse);

  // DeleteContacts removes contacts by client-assigned custom ID.
  rpc DeleteContacts(DeleteContactsRequest) returns (DeleteContactsResponse);

  // DeleteByPhones removes contacts by phone number (non-Tinkle entries).
  rpc DeleteByPhones(DeleteByPhonesRequest) returns (DeleteByPhonesResponse);

  // ResetSaved clears all non-Tinkle saved contacts.
  rpc ResetSaved(ResetSavedRequest) returns (ResetSavedResponse);

  // Block blocks a peer (user targets only; chat targets are not yet supported).
  rpc Block(BlockRequest) returns (BlockResponse);

  // Unblock removes a peer from the block list.
  rpc Unblock(UnblockRequest) returns (UnblockResponse);

  // GetBlocked retrieves paginated list of blocked peers.
  rpc GetBlocked(GetBlockedRequest) returns (GetBlockedResponse);

  // GetSaved returns all saved contacts for data export.
  rpc GetSaved(GetSavedRequest) returns (GetSavedResponse);
}

// =============================================================================
// Shared Contact Types
// =============================================================================

// ContactInput represents a contact for add or import operations.
message ContactInput {
  // User to add as contact. Takes precedence over phone if both provided.
  // At least one of user_id or phone must be specified.
  optional int64 user_id = 1;
  // First name to save.
  string first_name = 2;
  // Last name to save.
  optional string last_name = 3;
  // Phone number in E.164 format. Used to resolve user_id when user_id is not provided.
  optional string phone = 4;
  // Client-provided correlation identifier (required, max 255 chars).
  string custom_id = 5;
}

// Contact represents a resolved contact with detail fields.
message Contact {
  // Tinkle user ID.
  int64 user_id = 1;
  // First name.
  string first_name = 2;
  // Last name.
  optional string last_name = 3;
  // Phone number in E.164 format.
  string phone = 4;
  // Client-provided correlation identifier.
  string custom_id = 5;
}

// ImportedContact represents a successfully imported contact.
message ImportedContact {
  // Resolved Tinkle user ID (0 if not found).
  int64 user_id = 1;
  // Client-provided correlation ID echoed from input.
  string custom_id = 2;
}

// ContactPresence represents a single contact's presence status.
message ContactPresence {
  // User ID.
  int64 user_id = 1;
  // Presence status (online, offline, or unknown).
  UserPresence status = 2;
}

// ContactPresences is the response for GetPresences.
message ContactPresences {
  // Presence information for the caller's contacts.
  repeated ContactPresence presences = 1;
}

// PeerBlocked represents a blocked peer entry.
message PeerBlocked {
  // Blocked peer ID.
  int64 peer_id = 1;
}

// SavedContact represents a non-Tinkle saved contact.
message SavedContact {
  // Phone number.
  string phone = 1;
  // First name.
  string first_name = 2;
  // Last name.
  optional string last_name = 3;
  // When the contact was saved.
  google.protobuf.Timestamp date = 4;
}

// =============================================================================
// Import Contacts
// =============================================================================

// ImportContactsRequest is the request for ImportContacts.
message ImportContactsRequest {
  // List of contacts to import (max 500).
  repeated ContactInput contacts = 1;
}

// ImportContactsResponse is the response for ImportContacts.
message ImportContactsResponse {
  // Successfully imported and resolved contacts.
  repeated ImportedContact imported_contacts = 1;
  // Contacts that should be retried later (e.g., invalid phone format).
  repeated Contact retry_contacts = 2;
}

// =============================================================================
// Get Contacts
// =============================================================================

// GetContactsRequest is the request for GetContacts.
message GetContactsRequest {
  // Client-side hash for caching. If matches server, returns not modified.
  int64 hash = 1;
}

// GetContactsResponse is the response for GetContacts.
message GetContactsResponse {
  // Contact list. Empty if hash matches (not modified).
  repeated Contact contacts = 1;
  // Count of saved contacts (including non-Tinkle).
  int32 saved_count = 2;
}

// =============================================================================
// Contact Presence
// =============================================================================

// GetPresencesRequest is empty - the caller's identity comes from JWT.
message GetPresencesRequest {}

// GetPresencesResponse is the response for GetPresences.
message GetPresencesResponse {
  // Presence information for the caller's contacts.
  repeated ContactPresence presences = 1;
}

// =============================================================================
// Add / Delete Contacts
// =============================================================================

// AddContactRequest is the request for AddContact.
message AddContactRequest {
  // Contact to add.
  ContactInput contact = 1;
}

// AddContactResponse is the response for AddContact.
message AddContactResponse {
  // The added contact.
  Contact contact = 1;
}

// DeleteContactsRequest is the request for DeleteContacts.
message DeleteContactsRequest {
  // Client-provided custom IDs to delete from contacts.
  repeated string custom_ids = 1;
}

// DeleteContactsResponse is the response for DeleteContacts.
message DeleteContactsResponse {
  // Whether all requested deletions succeeded.
  bool success = 1;
  // Number of contacts deleted successfully.
  int32 deleted_count = 2;
  // Custom IDs that failed to delete. Non-empty when success is false.
  repeated string failed_custom_ids = 3;
}

// DeleteByPhonesRequest is the request for DeleteByPhones.
message DeleteByPhonesRequest {
  // Phone numbers to delete from saved contacts.
  repeated string phones = 1;
}

// DeleteByPhonesResponse is the response for DeleteByPhones.
message DeleteByPhonesResponse {
  // True if the operation succeeded.
  bool success = 1;
}

// ResetSavedRequest is the request for ResetSaved.
message ResetSavedRequest {}

// ResetSavedResponse is the response for ResetSaved.
message ResetSavedResponse {
  // True if the operation succeeded.
  bool success = 1;
}

// =============================================================================
// Blocking
// =============================================================================

// BlockRequest is the request for Block.
message BlockRequest {
  // The peer to block (user only — chat not yet supported).
  PeerInput peer = 1;
}

// BlockResponse is the response for Block.
message BlockResponse {
  // True if the peer was blocked.
  bool blocked = 1;
}

// UnblockRequest is the request for Unblock.
message UnblockRequest {
  // The peer to unblock.
  PeerInput peer = 1;
}

// UnblockResponse is the response for Unblock.
message UnblockResponse {
  // True if the peer was unblocked.
  bool unblocked = 1;
}

// GetBlockedRequest is the request for GetBlocked.
message GetBlockedRequest {
  // Pagination offset.
  int32 offset = 1;
  // Max results.
  int32 limit = 2;
}

// GetBlockedResponse is the response for GetBlocked.
message GetBlockedResponse {
  // List of blocked peers.
  repeated PeerBlocked blocked = 1;
  // Total count of blocked peers.
  int32 count = 2;
}

// =============================================================================
// Data Export
// =============================================================================

// GetSavedRequest is the request for GetSaved.
message GetSavedRequest {}

// GetSavedResponse is the response for GetSaved.
message GetSavedResponse {
  // All saved contacts for export.
  repeated SavedContact contacts = 1;
}
