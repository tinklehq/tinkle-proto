// Bot API Service — External-facing gRPC API for bot developers.
// Authentication: Bot token via "authorization: Bot <token>" gRPC metadata.
syntax = "proto3";

package tinkle.v1;

import "google/protobuf/timestamp.proto";
import "tinkle/v1/common.proto";

option go_package = "github.com/tinklehq/tinkle-proto/tinkle/v1;tinklev1";

// BotApiService is the external-facing gRPC service that bot developers call.
// This controller is stateless — it validates the bot token, then forwards to internal BotService.
service BotApiService {
  // GetMe retrieves the bot's own profile.
  rpc GetMe(GetMeRequest) returns (GetMeResponse);

  // SendMessage sends a text message to a chat.
  rpc SendMessage(BotApiServiceSendMessageRequest) returns (BotApiServiceSendMessageResponse);

  // SendPhoto sends a photo to a chat.
  rpc SendPhoto(SendPhotoRequest) returns (SendPhotoResponse);

  // SendDocument sends a document to a chat.
  rpc SendDocument(SendDocumentRequest) returns (SendDocumentResponse);

  // SendVideo sends a video to a chat.
  rpc SendVideo(SendVideoRequest) returns (SendVideoResponse);

  // SendAudio sends an audio file to a chat.
  rpc SendAudio(SendAudioRequest) returns (SendAudioResponse);

  // SendVoice sends a voice message to a chat.
  rpc SendVoice(SendVoiceRequest) returns (SendVoiceResponse);

  // SendSticker sends a sticker to a chat.
  rpc SendSticker(SendStickerRequest) returns (SendStickerResponse);

  // SendLocation sends a location to a chat.
  rpc SendLocation(SendLocationRequest) returns (SendLocationResponse);

  // SendContact sends a contact card to a chat.
  rpc SendContact(SendContactRequest) returns (SendContactResponse);

  // ForwardMessage forwards a message to another chat.
  rpc ForwardMessage(ForwardMessageRequest) returns (ForwardMessageResponse);

  // CopyMessage copies a message to another chat.
  rpc CopyMessage(CopyMessageRequest) returns (CopyMessageResponse);

  // EditMessageText edits the text of a message.
  rpc EditMessageText(EditMessageTextRequest) returns (EditMessageTextResponse);

  // EditMessageCaption edits the caption of a message.
  rpc EditMessageCaption(EditMessageCaptionRequest) returns (EditMessageCaptionResponse);

  // EditMessageMedia edits the media of a message.
  rpc EditMessageMedia(EditMessageMediaRequest) returns (EditMessageMediaResponse);

  // EditMessageReplyMarkup edits the inline keyboard of a message.
  rpc EditMessageReplyMarkup(EditMessageReplyMarkupRequest) returns (EditMessageReplyMarkupResponse);

  // DeleteMessage deletes a message.
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);

  // GetChat retrieves chat information.
  rpc GetChat(GetChatRequest) returns (GetChatResponse);

  // GetChatParticipant retrieves a chat participant's status and rights.
  rpc GetChatParticipant(GetChatParticipantRequest) returns (GetChatParticipantResponse);

  // GetChatParticipantCount retrieves the number of participants in a chat.
  rpc GetChatParticipantCount(GetChatParticipantCountRequest) returns (GetChatParticipantCountResponse);

  // BanChatParticipant bans a user from a chat.
  rpc BanChatParticipant(BanChatParticipantRequest) returns (BanChatParticipantResponse);

  // UnbanChatParticipant unbans a user from a chat.
  rpc UnbanChatParticipant(UnbanChatParticipantRequest) returns (UnbanChatParticipantResponse);

  // RestrictChatParticipant restricts a user's permissions in a chat.
  rpc RestrictChatParticipant(RestrictChatParticipantRequest) returns (RestrictChatParticipantResponse);

  // PromoteChatParticipant promotes a user to admin in a chat.
  rpc PromoteChatParticipant(PromoteChatParticipantRequest) returns (PromoteChatParticipantResponse);

  // LeaveChat makes the bot leave a chat.
  rpc LeaveChat(LeaveChatRequest) returns (LeaveChatResponse);

  // SetWebhook configures a webhook for the bot.
  rpc SetWebhook(SetWebhookRequest) returns (SetWebhookResponse);

  // DeleteWebhook removes the bot's webhook.
  rpc DeleteWebhook(DeleteWebhookRequest) returns (DeleteWebhookResponse);

  // GetWebhookInfo retrieves the bot's webhook configuration.
  rpc GetWebhookInfo(GetWebhookInfoRequest) returns (GetWebhookInfoResponse);

  // AnswerCallbackQuery answers a callback query from an inline keyboard.
  rpc AnswerCallbackQuery(AnswerCallbackQueryRequest) returns (AnswerCallbackQueryResponse);
}

// =============================================================================
// Self-Info
// =============================================================================

// GetMeRequest retrieves the bot's own profile. No fields — identity from token.
message GetMeRequest {}

// GetMeResponse returns the bot's profile information.
message GetMeResponse {
  // Unique bot identifier.
  int64 id = 1;
  // Bot display name.
  string name = 2;
  // Bot username (without leading @).
  string username = 3;
  // Whether the bot can be invited to group/broadcast chats.
  bool allow_muc = 4;
  // Whether the bot receives all messages in groups (not just commands).
  bool can_read_all_group_messages = 5;
  // Whether the bot supports inline queries.
  bool supports_inline_queries = 6;
}

// =============================================================================
// Sending Messages
// =============================================================================

// BotApiServiceSendMessageRequest sends a text message.
message BotApiServiceSendMessageRequest {
  // Target chat ID.
  int64 chat_id = 1;
  // Message text content. Must not be empty.
  string text = 2;
  // Text parsing mode: "Markdown" or "HTML". Omit for plain text.
  optional string parse_mode = 3;
  // Message ID to reply to.
  optional int64 reply_to_message_id = 4;
  // Inline keyboard attached to the message.
  optional InlineKeyboardMarkup reply_markup = 5;
  // Send silently without notification sound.
  optional bool disable_notification = 6;
}

// BotApiServiceSendMessageResponse returns the sent message metadata.
message BotApiServiceSendMessageResponse {
  int64 message_id = 1;
  google.protobuf.Timestamp date = 2;
}

// SendPhotoRequest sends a photo message.
message SendPhotoRequest {
  int64 chat_id = 1;
  int64 photo = 2;
  optional string caption = 3;
  optional string parse_mode = 4;
  optional int64 reply_to_message_id = 5;
  optional InlineKeyboardMarkup reply_markup = 6;
  optional bool disable_notification = 7;
}

// SendDocumentRequest sends a document message.
message SendDocumentRequest {
  int64 chat_id = 1;
  int64 document = 2;
  optional string caption = 3;
  optional string parse_mode = 4;
  optional int64 reply_to_message_id = 5;
  optional InlineKeyboardMarkup reply_markup = 6;
  optional bool disable_notification = 7;
}

// SendVideoRequest sends a video message.
message SendVideoRequest {
  int64 chat_id = 1;
  int64 video = 2;
  optional string caption = 3;
  optional string parse_mode = 4;
  optional int32 duration = 5;
  optional int32 width = 6;
  optional int32 height = 7;
  optional int64 reply_to_message_id = 8;
  optional InlineKeyboardMarkup reply_markup = 9;
  optional bool disable_notification = 10;
}

// SendAudioRequest sends an audio message.
message SendAudioRequest {
  int64 chat_id = 1;
  int64 audio = 2;
  optional string caption = 3;
  optional string parse_mode = 4;
  optional int32 duration = 5;
  optional string performer = 6;
  optional string title = 7;
  optional int64 reply_to_message_id = 8;
  optional InlineKeyboardMarkup reply_markup = 9;
  optional bool disable_notification = 10;
}

// SendVoiceRequest sends a voice message.
message SendVoiceRequest {
  int64 chat_id = 1;
  int64 voice = 2;
  optional string caption = 3;
  optional string parse_mode = 4;
  optional int32 duration = 5;
  optional int64 reply_to_message_id = 6;
  optional InlineKeyboardMarkup reply_markup = 7;
  optional bool disable_notification = 8;
}

// SendStickerRequest sends a sticker message.
message SendStickerRequest {
  int64 chat_id = 1;
  int64 sticker = 2;
  optional int64 reply_to_message_id = 3;
  optional InlineKeyboardMarkup reply_markup = 4;
  optional bool disable_notification = 5;
}

// SendLocationRequest sends a location message.
message SendLocationRequest {
  // Target chat ID.
  int64 chat_id = 1;
  // Latitude in degrees (-90.0 to 90.0).
  double latitude = 2;
  // Longitude in degrees (-180.0 to 180.0).
  double longitude = 3;
  // Period in seconds (60–86400) for live location updates. Omit for static location.
  optional int32 live_period = 4;
  // Message ID to reply to.
  optional int64 reply_to_message_id = 5;
  // Inline keyboard attached to the message.
  optional InlineKeyboardMarkup reply_markup = 6;
  // Send silently without notification sound.
  optional bool disable_notification = 7;
}

// SendContactRequest sends a contact message.
message SendContactRequest {
  int64 chat_id = 1;
  string phone_number = 2;
  string first_name = 3;
  optional string last_name = 4;
  optional string vcard = 5;
  optional int64 reply_to_message_id = 6;
  optional InlineKeyboardMarkup reply_markup = 7;
  optional bool disable_notification = 8;
}

// BotApiServiceSendMediaResponse is kept as a common envelope shared by all media-send RPCs
// via a oneof field, allowing handlers to populate a single response shape.
//
// Deprecated: use the per-method response (e.g. SendPhotoResponse) directly.
message BotApiServiceSendMediaResponse {
  option deprecated = true;
  int64 message_id = 1;
  google.protobuf.Timestamp date = 2;
}

// SendPhotoResponse returns the sent photo metadata.
message SendPhotoResponse {
  int64 message_id = 1;
  google.protobuf.Timestamp date = 2;
}

// SendDocumentResponse returns the sent document metadata.
message SendDocumentResponse {
  int64 message_id = 1;
  google.protobuf.Timestamp date = 2;
}

// SendVideoResponse returns the sent video metadata.
message SendVideoResponse {
  int64 message_id = 1;
  google.protobuf.Timestamp date = 2;
}

// SendAudioResponse returns the sent audio metadata.
message SendAudioResponse {
  int64 message_id = 1;
  google.protobuf.Timestamp date = 2;
}

// SendVoiceResponse returns the sent voice metadata.
message SendVoiceResponse {
  int64 message_id = 1;
  google.protobuf.Timestamp date = 2;
}

// SendStickerResponse returns the sent sticker metadata.
message SendStickerResponse {
  int64 message_id = 1;
  google.protobuf.Timestamp date = 2;
}

// SendLocationResponse returns the sent location metadata.
message SendLocationResponse {
  int64 message_id = 1;
  google.protobuf.Timestamp date = 2;
}

// SendContactResponse returns the sent contact metadata.
message SendContactResponse {
  int64 message_id = 1;
  google.protobuf.Timestamp date = 2;
}

// ForwardMessageRequest forwards a message to another chat.
message ForwardMessageRequest {
  int64 chat_id = 1;
  int64 from_chat_id = 2;
  int64 message_id = 3;
  optional bool disable_notification = 4;
}

// ForwardMessageResponse returns the forwarded message metadata.
message ForwardMessageResponse {
  int64 message_id = 1;
  google.protobuf.Timestamp date = 2;
}

// CopyMessageRequest copies a message to another chat.
message CopyMessageRequest {
  int64 chat_id = 1;
  int64 from_chat_id = 2;
  int64 message_id = 3;
  optional string caption = 4;
  optional string parse_mode = 5;
  optional InlineKeyboardMarkup reply_markup = 6;
  optional bool disable_notification = 7;
}

// CopyMessageResponse returns the copied message ID.
message CopyMessageResponse {
  int64 message_id = 1;
}

// =============================================================================
// Updating Messages
// =============================================================================

// EditMessageTextRequest edits the text of a message.
message EditMessageTextRequest {
  int64 chat_id = 1;
  int64 message_id = 2;
  string text = 3;
  optional string parse_mode = 4;
  optional InlineKeyboardMarkup reply_markup = 5;
}

// EditMessageCaptionRequest edits the caption of a message.
message EditMessageCaptionRequest {
  int64 chat_id = 1;
  int64 message_id = 2;
  optional string caption = 3;
  optional string parse_mode = 4;
  optional InlineKeyboardMarkup reply_markup = 5;
}

// EditMessageMediaRequest edits the media of a message.
message EditMessageMediaRequest {
  int64 chat_id = 1;
  int64 message_id = 2;
  InputMedia media = 3;
  optional InlineKeyboardMarkup reply_markup = 4;
}

// EditMessageReplyMarkupRequest edits the reply markup of a message.
message EditMessageReplyMarkupRequest {
  int64 chat_id = 1;
  int64 message_id = 2;
  optional InlineKeyboardMarkup reply_markup = 3;
}

// BotApiServiceEditMessageResponse is the common shape for all edit-message success responses.
//
// Deprecated: use the per-method response (e.g. EditMessageTextResponse) directly.
message BotApiServiceEditMessageResponse {
  option deprecated = true;
  bool success = 1;
}

// EditMessageTextResponse indicates whether the text edit succeeded.
message EditMessageTextResponse {
  bool success = 1;
}

// EditMessageCaptionResponse indicates whether the caption edit succeeded.
message EditMessageCaptionResponse {
  bool success = 1;
}

// EditMessageMediaResponse indicates whether the media edit succeeded.
message EditMessageMediaResponse {
  bool success = 1;
}

// EditMessageReplyMarkupResponse indicates whether the reply markup edit succeeded.
message EditMessageReplyMarkupResponse {
  bool success = 1;
}

// DeleteMessageRequest deletes a message.
message DeleteMessageRequest {
  int64 chat_id = 1;
  int64 message_id = 2;
}

// DeleteMessageResponse indicates whether the delete succeeded.
message DeleteMessageResponse {
  bool success = 1;
}

// =============================================================================
// Chat Information
// =============================================================================

// GetChatRequest retrieves chat information.
message GetChatRequest {
  int64 chat_id = 1;
}

// GetChatResponse returns chat details.
message GetChatResponse {
  int64 id = 1;
  string type = 2;
  optional string title = 3;
  optional string description = 4;
  optional int32 participant_count = 5;
}

// GetChatParticipantRequest retrieves a chat participant's status.
message GetChatParticipantRequest {
  int64 chat_id = 1;
  int64 user_id = 2;
}

// GetChatParticipantResponse returns the participant's status and rights.
message GetChatParticipantResponse {
  string status = 1;
  int64 user_id = 2;
  optional ChatAdminScopes admin_scopes = 3;
}

// GetChatParticipantCountRequest retrieves the number of participants in a chat.
message GetChatParticipantCountRequest {
  int64 chat_id = 1;
}

// GetChatParticipantCountResponse returns the participant count.
message GetChatParticipantCountResponse {
  int32 count = 1;
}

// =============================================================================
// Chat Administration
// =============================================================================

// BanChatParticipantRequest bans a user from a chat.
message BanChatParticipantRequest {
  int64 chat_id = 1;
  int64 user_id = 2;
  optional google.protobuf.Timestamp until_date = 3;
  optional bool revoke_messages = 4;
}

// BanChatParticipantResponse indicates success.
message BanChatParticipantResponse {
  bool success = 1;
}

// UnbanChatParticipantRequest unbans a user from a chat.
message UnbanChatParticipantRequest {
  int64 chat_id = 1;
  int64 user_id = 2;
  optional bool only_if_banned = 3;
}

// UnbanChatParticipantResponse indicates success.
message UnbanChatParticipantResponse {
  bool success = 1;
}

// RestrictChatParticipantRequest restricts a user's permissions in a chat.
message RestrictChatParticipantRequest {
  int64 chat_id = 1;
  int64 user_id = 2;
  ChatPermissions permissions = 3;
  optional google.protobuf.Timestamp until_date = 4;
}

// RestrictChatParticipantResponse indicates success.
message RestrictChatParticipantResponse {
  bool success = 1;
}

// PromoteChatParticipantRequest promotes a user to admin in a chat.
message PromoteChatParticipantRequest {
  int64 chat_id = 1;
  int64 user_id = 2;
  ChatAdminScopes admin_scopes = 3;
}

// PromoteChatParticipantResponse indicates success.
message PromoteChatParticipantResponse {
  bool success = 1;
}

// LeaveChatRequest makes the bot leave a chat.
message LeaveChatRequest {
  int64 chat_id = 1;
}

// LeaveChatResponse indicates success.
message LeaveChatResponse {
  bool success = 1;
}

// =============================================================================
// Webhook Management
// =============================================================================

// SetWebhookRequest configures a webhook for the bot.
message SetWebhookRequest {
  // HTTPS URL to receive webhook updates.
  string url = 1;
  // Secret token for X-Tinkle-Bot-Api-Secret-Token header verification (1-256 chars, A-Za-z0-9_-).
  optional string secret_token = 2;
  // List of update types to receive. Empty list = all types.
  repeated string allowed_updates = 3;
  // Maximum concurrent HTTPS connections for delivery (1-100, default 40).
  optional int32 max_connections = 4;
}

// SetWebhookResponse indicates success.
message SetWebhookResponse {
  bool success = 1;
}

// DeleteWebhookRequest removes the bot's webhook.
message DeleteWebhookRequest {}

// DeleteWebhookResponse indicates success.
message DeleteWebhookResponse {
  bool success = 1;
}

// GetWebhookInfoRequest retrieves the bot's webhook configuration.
message GetWebhookInfoRequest {}

// GetWebhookInfoResponse returns the webhook details.
message GetWebhookInfoResponse {
  // Configured webhook URL. Empty if no webhook is set.
  string url = 1;
  // Whether a custom certificate was provided.
  bool has_custom_certificate = 2;
  // Number of updates awaiting delivery.
  int32 pending_update_count = 3;
  // Timestamp of the most recent delivery error.
  optional google.protobuf.Timestamp last_error_date = 4;
  // Human-readable description of the most recent delivery error.
  optional string last_error_message = 5;
  // Maximum allowed concurrent connections.
  int32 max_connections = 6;
  // List of update types the webhook is subscribed to.
  repeated string allowed_updates = 7;
}

// =============================================================================
// Callback Queries
// =============================================================================

// AnswerCallbackQueryRequest answers a callback query from an inline keyboard.
message AnswerCallbackQueryRequest {
  // Unique ID of the callback query to answer.
  string callback_query_id = 1;
  // Text to show to the user (0-200 chars).
  optional string text = 2;
  // If true, show an alert dialog instead of a toast notification.
  optional bool show_alert = 3;
  // URL to open in the user's client.
  optional string url = 4;
  // Time in seconds that the callback query result may be cached client-side.
  optional int32 cache_time = 5;
}

// AnswerCallbackQueryResponse indicates success.
message AnswerCallbackQueryResponse {
  bool success = 1;
}

// =============================================================================
// Shared Types
// =============================================================================

// InlineKeyboardMarkup represents an inline keyboard.
message InlineKeyboardMarkup {
  repeated InlineKeyboardRow inline_keyboard = 1;
}

// InlineKeyboardRow represents one row of inline keyboard buttons.
message InlineKeyboardRow {
  repeated InlineKeyboardButton buttons = 1;
}

// InlineKeyboardButton represents a single inline keyboard button.
message InlineKeyboardButton {
  // Button label text.
  string text = 1;
  // URL to open when the button is pressed.
  optional string url = 2;
  // Data sent to the bot via callback query when pressed (1-64 bytes).
  optional string callback_data = 3;
  // Prompt the user to select a chat and pre-fill an inline query.
  optional string switch_inline_query = 4;
}

// InputMedia represents media to be sent or edited.
message InputMedia {
  // Media type: "photo", "video", "document", "audio", "animation".
  string type = 1;
  // File ID of the media to send.
  int64 media = 2;
  // Media caption (0-1024 chars).
  optional string caption = 3;
  // Caption parsing mode: "Markdown" or "HTML".
  optional string parse_mode = 4;
}

// ChatPermissions represents user permission flags in a chat.
message ChatPermissions {
  bool can_send_messages = 1;
  bool can_send_media_messages = 2;
  bool can_send_polls = 3;
  bool can_send_other_messages = 4;
  bool can_add_web_page_previews = 5;
  bool can_change_info = 6;
  bool can_invite_users = 7;
  bool can_pin_messages = 8;
  bool can_manage_topics = 9;
}
